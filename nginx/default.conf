upstream app_upstream {
    # `app` is the compose service name; Docker's embedded DNS resolver
    # at 127.0.0.11 turns it into the app container's IP on the shared
    # `edge` network. No hardcoded IPs, no linking required.
    server app:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Standard reverse-proxy headers. An interviewer may ask why you need
    # these: without them, the upstream sees nginx as the client and loses
    # the original IP/host/protocol — breaks logging, rate limiting, and
    # any scheme-aware redirects in the app.
    location / {
        proxy_pass http://app_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Quiet the access log for health probes so they don't drown real traffic.
    location = /health {
        proxy_pass http://app_upstream;
        access_log off;
    }

    # Nginx-local healthcheck. Returns 200 without proxying to the app so that
    # nginx's own health signal is independent of upstream availability.
    # A container's healthcheck should test its own primary process, not its
    # dependencies — dependencies have their own healthchecks.
    location = /_nginx_health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
