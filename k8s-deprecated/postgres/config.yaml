#--------------------------------------------------------------------------------------------------------
# DEPRECATED — superseded by charts/platformcore Helm chart (Day 24)
# Do NOT apply with kubectl apply — these resources are now Helm-managed.
# Source of truth: charts/platformcore/templates/
# To inspect rendered manifests: helm template platformcore charts/platformcore -n platformcore
#--------------------------------------------------------------------------------------------------------
#
# Non-secret postgres configuration: POSTGRES_USER and POSTGRES_DB.
# Consumed by the postgres StatefulSet via configMapKeyRef.
# POSTGRES_PASSWORD lives in postgres-secret (k8s/postgres/secret.yaml) -
# principle of least privilege says non-secret values stay in ConfigMaps,
# secret values stay in Secrets, no mixing.
#
# Failure mode: POSTGRES_DB or POSTGRES_USER mismatch with what the
# StatefulSet readinessProbe's pg_isready -U/-d arguments expect = probe
# never goes Ready, Pod never serves traffic, StatefulSet stalls at the
# first replica. Keep the StatefulSet probe args in sync with this file.



apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: platformcore
data:
  POSTGRES_USER: platformcore
  POSTGRES_DB: platformcore
