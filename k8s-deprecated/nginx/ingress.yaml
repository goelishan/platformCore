#--------------------------------------------------------------------------------------------------------
# DEPRECATED — superseded by charts/platformcore Helm chart (Day 24)
# Do NOT apply with kubectl apply — these resources are now Helm-managed.
# Source of truth: charts/platformcore/templates/
# To inspect rendered manifests: helm template platformcore charts/platformcore -n platformcore
#--------------------------------------------------------------------------------------------------------
#
# Host-based routing in front of the nginx Service. Maps host nginx.local
# at path / to the nginx ClusterIP Service on port 80.
# ingressClassName: nginx selects the in-cluster ingress-nginx controller
# (which is its own Deployment in the ingress-nginx namespace - separate
# from the nginx Pod this stack runs).
#
# Local resolution: for nginx.local to reach this Ingress, /etc/hosts on
# the dev machine needs an entry pointing nginx.local at 127.0.0.1, plus
# kind's port mapping forwarding host 80 to the cluster. Production uses
# a real DNS A/CNAME record fronted by an ALB.
#
# Failure mode: ingress-nginx controller not installed = manifest applies
# cleanly but no traffic flows (404 from the cluster's default backend).
# Verify with kubectl get pods -n ingress-nginx before debugging route
# shape. Annotation rewrite-target: / strips the matched path prefix
# before forwarding upstream - inert here at path /, will matter when we
# start mounting apps under prefixes like /api.



#--------------------------------------------------------------------------------------------------------
# NGINX - INGRESS (ALB)
#--------------------------------------------------------------------------------------------------------
#
# Provisions a real AWS Application Load Balancer in the VPC's public
# subnets (discovered via the kubernetes.io/role/elb=1 tag on public
# subnets). The ALB Controller in kube-system watches this object and
# materialises the ALB - this manifest is the declarative intent; the
# controller is the imperative actor.
#
# target-type: ip is the right default on EKS with VPC CNI - Pods have
# real VPC IPs, so the ALB targets Pod IPs directly. The alternative
# (instance) routes via NodePort, requiring SG holes on the node range
# and adding an extra hop. IP target type is cleaner and faster.
#
# No host: rule = catch-all on the ALB's default DNS. Once a Route53
# CNAME points a real hostname at the ALB, add a host: filter here.
#
# Failure modes:
# - Subnets not tagged kubernetes.io/role/elb=1 = "Failed to find at
#   least two subnets in different AZs". Tag-driven discovery, see
#   terraform/modules/network.
# - ingressClassName: alb references the IngressClass installed by the
#   ALB controller's Helm chart. Missing = "no IngressClass found".
# - Target group sync lag: after Ingress apply, ALB DNS resolves in
#   ~30s but target health takes another ~30-60s before the first 200.



apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  namespace: platformcore
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80

