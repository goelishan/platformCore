#--------------------------------------------------------------------------------------------------------
# DEPRECATED — superseded by charts/platformcore Helm chart (Day 24)
# Do NOT apply with kubectl apply — these resources are now Helm-managed.
# Source of truth: charts/platformcore/templates/
# To inspect rendered manifests: helm template platformcore charts/platformcore -n platformcore
#--------------------------------------------------------------------------------------------------------
#
# Holds DB_PASSWORD (legacy name - only nginx consumes it; rename to
# nginx-secret is logged tech debt) and API_KEY. Today these values are
# placeholder strings, not real credentials. Wired into the nginx
# Deployment via secretKeyRef.
#
# stringData vs data: stringData is write-only - the API server base64-
# encodes it at admission and stores it under .data. kubectl get secret
# -o yaml shows only data. This causes a three-way merge gap in GitOps
# pipelines (the last-applied annotation has plaintext, the live state
# has base64, kubectl can't cleanly diff). Phase 6 fix: External Secrets
# Operator pulling from AWS Secrets Manager, at which point this file
# goes away entirely.
#
# Failure mode: committing real secrets to git. Anything in this file is
# in repo history forever - rotate the value if exposed, do not just
# delete the commit. Treat as a learning artifact only.



apiVersion: v1
kind: Secret
metadata:
  name: nginx-secret
  namespace: platformcore
type: Opaque
stringData:
  API_KEY: "placeholder-api-key"