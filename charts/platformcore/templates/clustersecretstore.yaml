# charts/platformcore/templates/clustersecretstore.yaml
#
# ClusterSecretStore — cluster-scoped ESO backend config.
#
# Design choices:
#   - ClusterSecretStore (not SecretStore) — cluster-scoped so ExternalSecrets
#     in any namespace can reference it. SecretStore is namespace-scoped; you'd
#     need one per namespace, which is duplication for a single-app cluster.
#   - IRSA via the external-secrets SA — ESO controller has the role ARN injected
#     at install time; the store just names which SA to use for AWS auth.
#   - region: us-east-1 hardcoded — single-region project.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    {{- include "platformcore.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
