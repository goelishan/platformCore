# charts/platformcore/templates/nginx/externalsecret.yaml
#
# Pulls platformcore/app/nginx-api-key from Secrets Manager and materialises
# it as nginx-secret in the platformcore namespace. ESO reconciles every hour —
# a rotation in Secrets Manager propagates to the cluster within 1h automatically.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nginx-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platformcore.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: nginx-secret
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: platformcore/app/nginx-api-key
        property: API_KEY
