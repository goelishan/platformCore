#--------------------------------------------------------------------------------------------------------
# NGINX - DEPLOYMENT
#--------------------------------------------------------------------------------------------------------
#
# Stateless web tier. Replicas are interchangeable - any Pod can serve any
# request - so a Deployment is the right shape (vs StatefulSet for
# postgres). `replicas:` is intentionally omitted from this manifest
# because the HPA (k8s/nginx/hpa.yaml) owns .spec.replicas. Leaving it
# here would create a fight with HPA on every reconcile cycle once we
# move to GitOps in Phase 6 (Argo would patch replicas back to the static
# value; HPA would re-scale; ping-pong forever).
#
# Relies on: nginx-config ConfigMap (env keys + mounted nginx.conf),
# app-secret Secret (DB_PASSWORD env), metrics-server installed in cluster
# (so HPA can read CPU usage and compute the scale ratio).
#
# Failure modes: missing resource requests = HPA shows
# TARGETS <unknown>/50% and refuses to operate (formula needs a
# denominator). Volume mount path /etc/nginx/conf.d must match where
# nginx looks for *.conf at startup. Renaming app-secret to nginx-secret
# is logged tech debt - generic name implies broader use than reality.



apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: platformcore
spec:
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: nginx-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: nginx-config
                  key: LOG_LEVEL
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources: 
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-config
            items:
              - key: nginx.conf
                path: default.conf