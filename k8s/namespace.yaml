#--------------------------------------------------------------------------------------------------------
# NAMESPACE - platformcore
#--------------------------------------------------------------------------------------------------------
#
# Logical scope for every workload, Service, ConfigMap, Secret, and PVC in
# this stack. Namespaces are also the natural attachment point for RBAC,
# NetworkPolicy, and ResourceQuota - none configured today, all Phase 4+
# work that EKS makes more natural.
#
# Failure mode: deleting this namespace cascade-deletes every namespaced
# resource within it - every Pod, Service, ConfigMap, Secret, PVC. PVCs
# being deleted trigger the StorageClass reclaim policy, so on kind's
# Delete-policy SC the underlying volumes vanish too. Treat with the same
# care as `terraform destroy`.



apiVersion: v1
kind: Namespace
metadata:
  name: platformcore