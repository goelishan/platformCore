#--------------------------------------------------------------------------------------------------------
# POSTGRES - STATEFULSET
#--------------------------------------------------------------------------------------------------------
#
# StatefulSet (not Deployment) because postgres has identity + per-Pod
# data + ordered ops requirements that a Deployment can't satisfy:
# (1) Identity = stable Pod names (postgres-0, postgres-1) instead of
#     random hash suffixes. A respawned Pod gets the same name + same
#     PVC; replicas are addressable peers.
# (2) Per-Pod data = volumeClaimTemplates auto-creates one PVC per
#     replica (data-postgres-0, data-postgres-1). Each Pod owns its own
#     dedicated storage that survives Pod restarts and scale-down.
# (3) Ordered ops = postgres-N waits for postgres-(N-1) to be Ready
#     before starting; reverse order on scale-down. Critical for
#     stateful workloads where parallel restarts can corrupt state.
#
# Relies on:
# - Headless Service postgres-service (clusterIP: None) for per-Pod DNS.
#   Referenced by serviceName below. WAL streaming and leader election
#   need the per-Pod DNS names this provides.
# - postgres-config ConfigMap (POSTGRES_USER, POSTGRES_DB env).
# - postgres-secret Secret (POSTGRES_PASSWORD env).
#
# Failure modes:
# - serviceName referencing a non-headless Service = Pods come up Ready
#   but per-Pod DNS silently fails (replication topology breaks with no
#   visible error).
# - volumeClaimTemplates.metadata.name not matching the container's
#   volumeMounts.name = Pod mounts an emptyDir, data is lost on restart.
# - PVC delete on kind = data destroyed permanently (StorageClass
#   `standard` has reclaimPolicy: Delete; production wants gp3-retain
#   StorageClass with Retain so PVC delete only releases the binding).
#
# Production-shape next steps: gp3-retain StorageClass with Retain
# reclaim policy (Phase 4 carry-forward); a postgres operator like
# CloudNativePG or Zalando for automated failover and replication
# topology (Phase 4+); External Secrets Operator replacing the literal-
# password Secret (Phase 6).



apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: platformcore
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:17
        env:
          - name: POSTGRES_USER
            valueFrom: 
              configMapKeyRef:
                name: postgres-config
                key: POSTGRES_USER
          - name: POSTGRES_DB
            valueFrom:
              configMapKeyRef:
                name: postgres-config
                key: POSTGRES_DB
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_PASSWORD
          - name: PGDATA
            value: /var/lib/postgresql/data/pgdata
        ports:
          - containerPort: 5432
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        volumeMounts:
          - name: data
            mountPath: /var/lib/postgresql/data
        readinessProbe: 
          exec:
            command: ["pg_isready", "-U", "platformcore","-d","platformcore"]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        volumeMode: Filesystem
        resources:
          requests:
            storage: 1Gi