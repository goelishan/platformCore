#--------------------------------------------------------------------------------------------------------
# POSTGRES - SECRET
#--------------------------------------------------------------------------------------------------------
#
# Holds POSTGRES_PASSWORD. Wired into the postgres StatefulSet via
# secretKeyRef. Today the value is a literal string in YAML - acceptable
# for kind / learning, unacceptable for production.
#
# Phase 6 target: External Secrets Operator pulls the actual password
# from AWS Secrets Manager and synthesizes this Secret in-cluster, so
# the value lives in AWS SM (rotated, audited, IAM-scoped) and never
# sits in git.
#
# Failure mode: stringData / data three-way merge gap - same caveat as
# nginx-secret. GitOps changes here are awkward; ESO sidesteps the
# issue by removing the in-git Secret entirely.



apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: platformcore
type: Opaque
stringData:
  POSTGRES_PASSWORD: platformcore
