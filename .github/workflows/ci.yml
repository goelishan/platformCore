name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: platformcore

jobs:
  validate:
    name: Validate compose files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed .env from .env.example
        # Compose does parse-time substitution of ${VAR}. Without a .env file
        # present, substitutions resolve to empty strings and mask real bugs.
        run: cp .env.example .env

      - name: Validate base compose (production-shaped)
        # -f forces base-only resolution, ignoring any override file.
        # This is what gets deployed; it must parse on its own.
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate merged compose (dev + base)
        # No -f, so compose auto-merges override. Catches override-only
        # typos that would otherwise only surface on a dev laptop.
        run: docker compose config > /dev/null

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.ECR_REPO }}:${{ github.sha }} ./app
          docker push ${{ secrets.ECR_REPO }}:${{ github.sha }}

  update-image-tag:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update fastapi image tag in values.yaml
        # Scoped to the line following the ECR repo URL — avoids touching
        # nginx (tag: alpine) and postgres (tag: "17") image tag lines.
        run: |
          sed -i '/platformcore-app/{n;s|tag: .*|tag: ${{ github.sha }}|}' charts/platformcore/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/platformcore/values.yaml
          git commit -m "ci: update fastapi image tag to ${{ github.sha }} [skip ci]"
          git push
