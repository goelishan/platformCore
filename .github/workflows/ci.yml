name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate compose files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Seed .env from .env.example
        # Compose does parse-time substitution of ${VAR}. Without a .env file
        # present, substitutions resolve to empty strings and mask real bugs.
        run: cp .env.example .env

      - name: Validate base compose (production-shaped)
        # -f forces base-only resolution, ignoring any override file.
        # This is what gets deployed; it must parse on its own.
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate merged compose (dev + base)
        # No -f, so compose auto-merges override. Catches override-only
        # typos that would otherwise only surface on a dev laptop.
        run: docker compose config > /dev/null

  build:
    name: Build app image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Seed .env from .env.example
        run: cp .env.example .env

      - name: Build app image
        # Building just the `app` service — nginx and postgres are upstream
        # images, no point rebuilding them. If the Dockerfile or
        # requirements.txt break, this fails here.
        run: docker compose build app