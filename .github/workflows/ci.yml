name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: platformcore

jobs:
  validate:
    name: Validate compose files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed .env from .env.example
        # Compose does parse-time substitution of ${VAR}. Without a .env file
        # present, substitutions resolve to empty strings and mask real bugs.
        run: cp .env.example .env

      - name: Validate base compose (production-shaped)
        # -f forces base-only resolution, ignoring any override file.
        # This is what gets deployed; it must parse on its own.
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate merged compose (dev + base)
        # No -f, so compose auto-merges override. Catches override-only
        # typos that would otherwise only surface on a dev laptop.
        run: docker compose config > /dev/null

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          docker build -t ${{ secrets.ECR_REPO }}:${{ github.sha }} ./app
          docker push ${{ secrets.ECR_REPO }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Deploy
        run: |
          helm upgrade --install platformcore charts/platformcore \
            -n platformcore --create-namespace \
            --set image.repository=${{ secrets.ECR_REPO }} \
            --set image.tag=${{ github.sha }} \
            --atomic \
            --timeout 5m
